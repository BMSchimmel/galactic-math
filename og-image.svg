<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#c8860a"/>
    </linearGradient>
    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#030712"/>

  <!-- Nebula -->
  <ellipse cx="200" cy="160" rx="320" ry="220" fill="rgba(26,39,68,0.55)"/>
  <ellipse cx="1050" cy="490" rx="260" ry="180" fill="rgba(60,20,80,0.35)"/>

  <!-- Stars -->
  <circle cx="90" cy="55" r="1.5" fill="#e8f4ff" opacity="0.7"/>
  <circle cx="230" cy="28" r="1" fill="#e8f4ff" opacity="0.5"/>
  <circle cx="460" cy="75" r="1.5" fill="#e8f4ff" opacity="0.6"/>
  <circle cx="720" cy="18" r="1" fill="#e8f4ff" opacity="0.8"/>
  <circle cx="970" cy="50" r="1.5" fill="#e8f4ff" opacity="0.5"/>
  <circle cx="1110" cy="88" r="1" fill="#e8f4ff" opacity="0.7"/>
  <circle cx="1175" cy="32" r="1.5" fill="#e8f4ff" opacity="0.4"/>
  <circle cx="55" cy="410" r="1" fill="#e8f4ff" opacity="0.6"/>
  <circle cx="350" cy="565" r="1.5" fill="#e8f4ff" opacity="0.5"/>
  <circle cx="590" cy="595" r="1" fill="#e8f4ff" opacity="0.7"/>
  <circle cx="880" cy="610" r="1.5" fill="#e8f4ff" opacity="0.4"/>
  <circle cx="1155" cy="575" r="1" fill="#e8f4ff" opacity="0.6"/>
  <circle cx="140" cy="310" r="1" fill="#e8f4ff" opacity="0.4"/>
  <circle cx="1060" cy="200" r="1.5" fill="#e8f4ff" opacity="0.5"/>

  <!-- Blue glow behind planet -->
  <ellipse cx="600" cy="245" rx="160" ry="160" fill="url(#glowBlue)"/>

  <!-- Planet — same design as favicon, scaled up -->
  <circle cx="600" cy="245" r="88" fill="#1a2744" stroke="#00d4ff" stroke-width="3"/>
  <!-- Ring -->
  <ellipse cx="600" cy="245" rx="148" ry="52" fill="none" stroke="#ffd700" stroke-width="3" opacity="0.9"/>
  <!-- Small stars near planet -->
  <circle cx="480" cy="178" r="4" fill="#e8f4ff" opacity="0.5"/>
  <circle cx="730" cy="192" r="3" fill="#e8f4ff" opacity="0.4"/>
  <circle cx="700" cy="308" r="3.5" fill="#e8f4ff" opacity="0.45"/>

  <!-- Title -->
  <text x="600" y="400" font-family="Arial Black, Arial, sans-serif" font-size="80" font-weight="900" fill="url(#titleGrad)" text-anchor="middle" letter-spacing="5">GALACTIC MATH</text>
  <!-- Subtitle -->
  <text x="600" y="455" font-family="Arial, sans-serif" font-size="30" fill="#00d4ff" text-anchor="middle" letter-spacing="12" opacity="0.9">ACADEMY</text>
  <!-- Tagline -->
  <text x="600" y="530" font-family="Arial, sans-serif" font-size="22" fill="#6b7fa3" text-anchor="middle" letter-spacing="2">Space-themed math training for kids · Free · No login</text>
</svg>
